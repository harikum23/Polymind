# Polymind deployment topology (ARCHITECTURE.md §11.3):
#   Internet --HTTPS--> caddy (TLS) --> polymind (:8090) --> ollama (host) + searxng
#   optional: redis (compose profile "scale")
#
# Always on: polymind + caddy + searxng (+ host ollama via host.docker.internal).
# Run: docker compose up -d
# With Redis: docker compose --profile scale up -d
# Knowledge layer (pgvector): docker compose --profile knowledge up -d  (sets postgres profile)

services:
  polymind:
    build: .
    image: polymind:0.1.0
    container_name: polymind
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SEARXNG_BASE_URL: http://searxng:8080
      POLYMIND_AUTH_ENABLED: ${POLYMIND_AUTH_ENABLED:-true}
      POLYMIND_ADMIN_KEY: ${POLYMIND_ADMIN_KEY:-pmk-admin-dev}
      # Stable pre-shared key for external services (e.g. TradeEngine); survives restarts.
      POLYMIND_SERVICE_KEY: ${POLYMIND_SERVICE_KEY:-}
      # Knowledge layer (pgvector) — enabled:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_URL: jdbc:postgresql://postgres:5432/polymind
      # Relevance gate: 0.35 let off-topic calls (e.g. JSON-only prompts) pull ~900 tokens of
      # digest context; 0.55 verified 2026-07-22 to block those while keeping research calls augmented.
      POLYMIND_KNOWLEDGE_MIN_SCORE: ${POLYMIND_KNOWLEDGE_MIN_SCORE:-0.55}
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    networks:
      - polymind-net

  caddy:
    image: caddy:2-alpine
    container_name: polymind-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - polymind
    networks:
      - polymind-net

  searxng:
    image: searxng/searxng:latest
    container_name: polymind-searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8889:8080"
    networks:
      - polymind-net

  # Optional: Postgres + pgvector for the knowledge layer.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: polymind-postgres
    profiles: ["knowledge"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: polymind
      POSTGRES_USER: polymind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymind}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - polymind-net

  # Nightly trade-research digest + ad-hoc Claude-CLI research endpoint (docs/nightly-digest.md).
  # Runs the digest on the user's Claude Max subscription ($0 marginal) and reindexes it into the
  # `trade-engine` knowledge pack. Scheduler runs in-container (project policy: no host cron).
  trade-digest:
    build: ./docker/digest
    image: polymind-trade-digest:0.1.0
    container_name: polymind-trade-digest
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
      # From `claude setup-token` on the host (Max subscription). Blank => /ask & digest report 503.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      POLYMIND_URL: http://polymind:9090
      POLYMIND_ADMIN_KEY: ${POLYMIND_ADMIN_KEY:-pmk-admin-dev}
      DIGEST_PACK: trade-engine
      DIGEST_MODEL: haiku            # policy: haiku|sonnet only; opus is rejected
      # Two IST runs so both sessions get fresh context: 06:30 pre-NSE-open (india-open focus),
      # 18:45 pre-US-open (us-open focus). Comma-separated HH:MM list.
      DIGEST_SCHEDULE: "06:30,18:45"
      DIGEST_API_KEY: ${DIGEST_API_KEY:-}   # if set, /ask & /digest/run require this Bearer token
    ports:
      - "9091:9091"                 # published so TradeEngine can reach it via host.docker.internal:9091
    volumes:
      - digest-data:/data
    depends_on:
      - polymind
    networks:
      - polymind-net

  # Optional: Redis for shared cache/quota/rate-limit across replicas (profile "scale").
  redis:
    image: redis:7-alpine
    container_name: polymind-redis
    profiles: ["scale"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - polymind-net

networks:
  polymind-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  pg-data:
  digest-data:
